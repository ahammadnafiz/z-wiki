name: Invariants

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  check:
    # Matches the review.md P2 ask: run check_invariants.sh on every push
    # so drift is caught at commit time instead of at next /wiki-lint.
    # Note: no run: step interpolates github event context, so there is
    # no command-injection surface for untrusted input.
    name: check_invariants.sh
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Run invariant suite
        run: bash scripts/check_invariants.sh
